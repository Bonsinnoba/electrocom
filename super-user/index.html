<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="EssentialsHub Super User – Root access panel for global system oversight and administration." />
  <title>Super User Panel · EssentialsHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>

<body>
  <!-- ── Mobile / Small-screen blocker ──────────────────────────────────── -->
  <!-- Shown only on screens < 768px via CSS. The #root is hidden by media query. -->
  <div id="mobile-blocker">
    <div style="
        width:80px;height:80px;border-radius:20px;
        background:linear-gradient(135deg,#fbbf24,#f59e0b);
        display:flex;align-items:center;justify-content:center;
        font-size:36px;margin-bottom:28px;
        box-shadow:0 20px 40px rgba(251,191,36,0.3);
        flex-shrink:0;
      ">🛡️</div>

    <h1 style="
        font-family:'Outfit',sans-serif;font-size:26px;font-weight:900;
        color:#ffffff;margin-bottom:12px;letter-spacing:-0.5px;
      ">Tablet or Laptop Required</h1>

    <p style="
        font-family:'Outfit',sans-serif;font-size:15px;color:#94a3b8;
        max-width:320px;line-height:1.6;margin-bottom:28px;font-weight:500;
      ">
      The <strong style="color:#fbbf24">Super User Panel</strong> is a high-density administration interface
      designed exclusively for <strong style="color:#fff">tablet and desktop</strong> devices.
      Please switch to a device with a screen width of at least <strong style="color:#fff">768 px</strong>.
    </p>

    <div style="
        padding:12px 24px;border-radius:10px;
        background:rgba(251,191,36,0.08);
        border:1px solid rgba(251,191,36,0.25);
        font-family:'Outfit',sans-serif;font-size:13px;
        color:#fbbf24;font-weight:800;letter-spacing:0.5px;
        text-transform:uppercase;
      ">🔒 Root Access · Restricted Device</div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
